{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}SmartPark{% endblock %}</title>
    <meta name="description" content="{% block meta_description %}SmartPark — scan, park, go.{% endblock %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    {% block extra_head %}{% endblock %}
</head>
<body>

<a href="#main-content" class="skip-link">Skip to content</a>

<header class="navbar">
    <a href="{% url 'parking:home' %}" class="navbar-logo">
        <span class="logo-mark">P</span>
        SmartPark
    </a>
    <nav class="navbar-nav">
        <a href="{% url 'parking:home' %}">Home</a>
        <a href="{% url 'parking:entry' %}">Entry</a>
        <a href="{% url 'parking:exit_scan' %}">Exit</a>
    </nav>
</header>

<main id="main-content" class="wrapper">
    {% block content %}{% endblock %}
</main>

<footer class="footer">
    &copy; 2026 SmartPark &mdash; Parking Management System
</footer>

{% block extra_js %}{% endblock %}
</body>
</html>
